#!/usr/sbin/nft -f
# =============================================================================
# nftables Alternative Configuration
# Use instead of iptables if preferred (Ubuntu 20.10+)
# =============================================================================

flush ruleset

table inet filter {

    chain input {
        type filter hook input priority 0; policy drop;

        iif lo accept
        ct state established,related accept
        tcp dport 22 accept
        udp dport {67, 68} accept
        udp dport 53 accept
        tcp dport 53 accept
        ip saddr 192.168.1.0/24 tcp dport {80, 443} accept
        ip protocol icmp limit rate 1/second accept
        limit rate 5/minute log prefix "NFT-INPUT-DROP: "
        drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;

        ct state established,related accept

        # LAN1 → Web Server
        ip saddr 192.168.1.0/24 ip daddr 192.168.1.10 tcp dport {80, 443} accept

        # LAN1 → Internet
        iifname "eth0.10" oifname "eth0" accept

        # LAN2 → Internet (restricted)
        iifname "eth0.20" oifname "eth0" tcp dport {80, 443} accept

        # BLOCK: LAN2 → LAN1
        iifname "eth0.20" oifname "eth0.10" log prefix "NFT-LAN2-LAN1-BLOCK: " drop

        # BLOCK: LAN1 → LAN2
        iifname "eth0.10" oifname "eth0.20" log prefix "NFT-LAN1-LAN2-BLOCK: " drop

        limit rate 5/minute log prefix "NFT-FORWARD-DROP: "
        drop
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

table ip nat {
    chain postrouting {
        type nat hook postrouting priority 100; policy accept;

        ip saddr 192.168.1.0/24 oifname "eth0" masquerade
        ip saddr 192.168.2.0/24 oifname "eth0" masquerade
    }
}
